[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Content-Type = "text/javascript"
    Content-Disposition = "inline"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Content-Type = "text/javascript"
    Content-Disposition = "inline"